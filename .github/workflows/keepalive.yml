# ============================================================
#  Mantiene despierto el backend gratuito de Render.
#  Render duerme el servicio tras ~15 min sin uso; este "ping"
#  cada 10 minutos evita que se duerma, asi nadie espera los ~50s.
# ============================================================
name: Mantener backend despierto

on:
  schedule:
    - cron: '*/10 * * * *'   # cada 10 minutos
  workflow_dispatch:          # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping al backend (health)
        run: curl -sS -m 30 https://programador007.onrender.com/api/health || true
